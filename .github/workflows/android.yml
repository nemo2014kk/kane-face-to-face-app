name: Build Android APK

on:
  push:
    tags:
      - 'v*' # 当你发布以 v 开头的版本（如 v4.0.1）时，触发自动打包

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest # 使用 Linux 虚拟电脑编译，速度极快

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 🌟 核心修改 1：将 assembleDebug 改为 assembleRelease，生成正式版(无签名) APK
      - name: Build Release APK
        run: ./gradlew assembleRelease 

      # 🌟 核心修改 2：调用你刚才在 GitHub 填写的 4 个密码，给 APK 盖上你的专属防伪印章！
      - name: Sign Release APK
        id: sign_app
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      # 🌟 核心修改 3：提取云端签好名的 APK，并重命名为酷炫的名字
      - name: Rename APK File
        run: mv "${{steps.sign_app.outputs.signedReleaseFile}}" "KANE_Face_to_Face_${{ github.ref_name }}.apk"
      
      - name: Attest build provenance (安全平台审核必需的数字证书)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'KANE_Face_to_Face_${{ github.ref_name }}.apk'

      # 🌟 核心修改 4：将最终签好名的正式版 APK 挂载到 Releases 页面
      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          files: KANE_Face_to_Face_${{ github.ref_name }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
