name: Build Android APK

on:
  push:
    tags:
      - 'v*' # 当你发布以 v 开头的版本时，触发自动打包

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest # 使用 Linux 虚拟电脑编译

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease 

      # 🌟 终极方案：抛弃年久失修的第三方插件，直接调用谷歌原生命令行进行极速签名！
      - name: Sign APK (Native)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          # 1. 从 GitHub 保险箱中将 Base64 还原成真实的秘钥文件
          echo $KEYSTORE_BASE64 | base64 --decode > my-release-key.jks
          
          # 2. 找到刚才编译出来的那颗无签名 APK
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          
          # 3. 自动定位云端系统里【最新】的安卓编译工具 (彻底杜绝版本找不到的问题)
          BUILD_TOOLS_DIR=$(ls -d $ANDROID_HOME/build-tools/* | tail -1)
          
          # 4. 执行内存对齐优化（zipalign），让 App 运行更流畅
          $BUILD_TOOLS_DIR/zipalign -v -p 4 $APK_PATH app-release-aligned.apk
          
          # 5. 拿出刚才还原的秘钥，正式盖上你的专属数字印章（apksigner）
          $BUILD_TOOLS_DIR/apksigner sign --ks my-release-key.jks --ks-pass pass:$KEYSTORE_PASSWORD --key-pass pass:$KEY_PASSWORD --ks-key-alias $KEY_ALIAS --out KANE_Face_to_Face_${{ github.ref_name }}.apk app-release-aligned.apk

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'KANE_Face_to_Face_${{ github.ref_name }}.apk'

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          files: KANE_Face_to_Face_${{ github.ref_name }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
