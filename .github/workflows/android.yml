name: Build Android APK

on:
  push:
    tags:
      - 'v*' # 当你发布以 v 开头的版本（如 v2.5.0）时，触发自动打包

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest # 使用 Linux 虚拟电脑编译，速度极快

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17 # 安装 Java 17 环境来编译你的安卓项目
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: gradle # 开启缓存，让以后打包速度提升一倍

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew # 赋予打包脚本执行权限

      - name: Build Debug APK
        run: ./gradlew assembleDebug 
        # 💡 小白知识：这里打包的是 Debug 版 APK。它自带安卓默认签名，发给任何人都能直接安装测试！

      - name: Attest build provenance (安全平台审核必需的数字证书)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'app/build/outputs/apk/debug/*.apk'

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/*.apk # 自动把生成的 apk 挂载到 Releases 页面
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
